ons":["①は比喩","②は基準","④は願望"]},{"id":99,"type":"relationship","difficulty":2,"question":"「氷：水」と同じ関係のものを選んでください。","options":["雪：雨","蒸気：湯","バター：牛乳","灰：木"],"answer":2,"explanation":"「変化後：元の原料」の関係。","wrongExplanations":["雪と雨は直接変化でない","蒸気と湯は逆","灰と木は不可逆変化"]},{"id":100,"type":"meaning","difficulty":6,"question":"「白河夜船」の意味として最も適切なものを選んでください。","options":["ぐっすり眠って何も知らないこと","深夜に出発すること","知ったかぶり","穏やかな夜"],"answer":0,"explanation":"「しらかわよふね」。ぐっすり寝ていて何も知らないこと。","wrongExplanations":["深夜は字面","知ったかぶりは語源に近いが主な意味は熟睡","穏やかは字面"]},{"id":101,"type":"meaning","difficulty":7,"question":"「朝三暮四」の意味として最も適切なものを選んでください。","options":["目先の違いにとらわれて結果が同じことに気づかないこと","態度を変えること","三日坊主","朝から晩まで忙しいこと"],"answer":0,"explanation":"「ちょうさんぼし」。目先の数にこだわり本質を見失うこと。","wrongExplanations":["態度は「朝令暮改」","三日坊主は別の意味","忙しいは字面"]},{"id":102,"type":"meaning","difficulty":7,"question":"「蛇足」の意味として最も適切なものを選んでください。","options":["余計な付け足しで全体を損なうこと","卑怯なやり方","些細なこと","予想外の展開"],"answer":0,"explanation":"「だそく」。蛇に足を描き足して負けた故事。余計なことをして台無しにすること。","wrongExplanations":["卑怯は「姑息」","些細は「些末」","予想外は「想定外」"]},{"id":103,"type":"meaning","difficulty":2,"question":"「矛盾」の意味として最も適切なものを選んでください。","options":["つじつまが合わないこと","武器で戦うこと","助け合うこと","強い防御"],"answer":0,"explanation":"「むじゅん」。何でも貫く矛と何でも防ぐ盾の故事。","wrongExplanations":["武器は字面","助け合うは「相互扶助」","防御は字面"]},{"id":104,"type":"meaning","difficulty":3,"question":"「本末転倒」の意味として最も適切なものを選んでください。","options":["逆転して有利になること","重要なことと些末なことの順序が逆になること","転がるように進むこと","結論が変わること"],"answer":1,"explanation":"「ほんまつてんとう」。本（根本）と末（枝葉）が逆転すること。","wrongExplanations":["有利は「逆転」","進むは「順調」","変わるは「朝令暮改」"]},{"id":105,"type":"meaning","difficulty":4,"question":"「針小棒大」の意味として最も適切なものを選んでください。","options":["小さいことを大げさに言うこと","大きなものを小さく見せること","鋭い指摘","一本筋が通っていること"],"answer":0,"explanation":"「しんしょうぼうだい」。針ほどの小さなことを棒ほどに大きく言うこと。","wrongExplanations":["小さく見せるは「矮小化」","鋭い指摘は「辛辣」","一本筋は「一貫性」"]}];

/* ─── Helpers ─── */
const GL={meaning:"意味",usage:"用法",relationship:"2語の関係",reverse:"逆引き",structure:"熟語の成り立ち"};
const ML_={normal:"通常モード（SPIシミュレーション）",unsolved:"未出題・出題回数が少ない問題",difficulty:"難易度指定",genre:"ジャンル指定",weak:"苦手問題",recent_wrong:"直近の間違い"};
const OPT_="①②③④⑤";
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function shuffleOpts(q){const idx=q.options.map((_,i)=>i);const sh=shuffle(idx);return{...q,_opts:sh.map(i=>q.options[i]),_ans:sh.indexOf(q.answer),_map:sh};}
const C={accent:"#3451b2",accentSoft:"#3451b210",correct:"#15803d",correctBg:"#15803d10",wrong:"#b91c1c",wrongBg:"#b91c1c10",text:"#111",textMid:"#333",textDim:"#555",card:"#f5f5f7",cardH:"#ecedf0",border:"#d4d5da",timer:"#d4d5da",warn:"#b45309"};

function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);return React.createElement("div",{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#222",color:"#fff",padding:"12px 24px",borderRadius:10,fontSize:14,fontWeight:500,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",maxWidth:"90vw",textAlign:"center"}},msg);}
function ConfirmDlg({msg,onOk,onCancel}){return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9998,padding:16}}><div style={{background:"#fff",borderRadius:14,padding:"24px 20px",maxWidth:340,width:"100%",boxShadow:"0 8px 30px rgba(0,0,0,0.2)"}}><p style={{fontSize:15,color:C.text,margin:"0 0 20px",lineHeight:1.6,whiteSpace:"pre-line"}}>{msg}</p><div style={{display:"flex",gap:10}}><button onClick={onCancel} style={{flex:1,padding:"12px 0",borderRadius:8,border:"1.5px solid "+C.border,background:"#fff",color:C.textMid,fontSize:14,fontWeight:600,cursor:"pointer"}}>キャンセル</button><button onClick={onOk} style={{flex:1,padding:"12px 0",borderRadius:8,border:"none",background:C.wrong,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>実行</button></div></div></div>;}
function DiffAdj({qid,db,setDb}){const q=db.find(x=>x.id===qid);if(!q)return null;const adj=d=>{const n=db.map(x=>x.id===qid?{...x,difficulty:Math.max(1,Math.min(7,x.difficulty+d))}:x);setDb(n);LS.set("spi-q",JSON.stringify(n));};return <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:12,color:C.textMid}}>難易度 {q.difficulty}</span><button onClick={()=>adj(-1)} disabled={q.difficulty<=1} style={{border:"none",background:"transparent",fontSize:16,cursor:"pointer",color:q.difficulty>1?C.accent:"#ccc",fontWeight:700}}>−</button><button onClick={()=>adj(1)} disabled={q.difficulty>=7} style={{border:"none",background:"transparent",fontSize:16,cursor:"pointer",color:q.difficulty<7?C.accent:"#ccc",fontWeight:700}}>＋</button></div>;}
function Expl({q,ans,db,setDb}){const orig=db.find(x=>x.id===q.id)||q;return <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginTop:12,border:"1.5px solid "+(ans?.correct?C.correct:C.wrong)}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:ans?.choice===-1?C.wrong:ans?.correct?C.correct:C.wrong}}>{ans?.choice===-1?"時間切れ":ans?.correct?"正解！":"不正解"}</span><DiffAdj qid={q.id} db={db} setDb={setDb}/></div><p style={{fontSize:13,lineHeight:1.7,margin:"0 0 10px",color:C.text}}>{orig.explanation}</p>{orig.wrongExplanations&&<div style={{borderTop:"1px solid "+C.border,paddingTop:8,marginTop:8}}><p style={{fontSize:11,fontWeight:600,color:C.textMid,margin:"0 0 4px"}}>他の選択肢</p>{orig.options.map((o,i)=>i!==orig.answer&&<p key={i} style={{fontSize:12,color:C.textMid,margin:"2px 0",lineHeight:1.5}}>{OPT_[i]} {o}：{orig.wrongExplanations[i>orig.answer?i-1:i]||""}</p>)}</div>}</div>;}
function Tag({children,bg,fg}){return <span style={{display:"inline-block",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:bg,color:fg,marginRight:6,marginBottom:4}}>{children}</span>;}

/* ════ Main ════ */
function App(){
  const [scr,setScr]=useState("home");const [mode,setMode]=useState("normal");const [num,setNum]=useState(10);
  const [tmOn,setTmOn]=useState(true);const [tmSec,setTmSec]=useState(15);const [selDiff,setSelDiff]=useState(3);const [selGenre,setSelGenre]=useState("meaning");const [shuf,setShuf_]=useState(true);
  const [qs,setQs]=useState([]);const [ci,setCi]=useState(0);const [ans,setAns]=useState([]);
  const [tl,setTl]=useState(15);const [tmAct,setTmAct]=useState(false);const [showExp,setShowExp]=useState(false);const [done,setDone]=useState(false);const [rvi,setRvi]=useState(null);
  const [lfG,setLfG]=useState("all");const [lfD,setLfD]=useState(0);const [lfSort,setLfSort]=useState("id");const [lex,setLex]=useState(null);
  const [db,setDb]=useState([]);const [stats,setStats]=useState({});const [rw,setRw]=useState([]);const [loaded,setLoaded]=useState(false);
  const [toast,setToast]=useState(null);const [cfm,setCfm]=useState(null);
  const [impUrl,setImpUrl]=useState("");const [impText,setImpText]=useState("");
  const tmRef=useRef(null);const fileRef=useRef(null);
  const showToast=msg=>setToast(msg);const doConfirm=(msg,fn)=>setCfm({msg,fn});

  useEffect(()=>{
    let q=null;try{const v=LS.get("spi-q");if(v)q=JSON.parse(v);}catch{}
    setDb(q&&Array.isArray(q)&&q.length?q:DEFAULT_Q);
    try{const v=LS.get("spi-s");if(v)setStats(JSON.parse(v));}catch{}
    try{const v=LS.get("spi-rw");if(v)setRw(JSON.parse(v));}catch{}
    setLoaded(true);
  },[]);

  const saveDb=useCallback(ndb=>{setDb(ndb);LS.set("spi-q",JSON.stringify(ndb));},[]);
  const save=useCallback((ns,nr)=>{setStats(ns);if(nr!==undefined)setRw(nr);LS.set("spi-s",JSON.stringify(ns));if(nr!==undefined)LS.set("spi-rw",JSON.stringify(nr));},[]);

  useEffect(()=>{if(tmAct&&tmOn&&tl>0){tmRef.current=setTimeout(()=>setTl(t=>t-0.1),100);return()=>clearTimeout(tmRef.current);}if(tmAct&&tmOn&&tl<=0)doAnswer(-1);},[tmAct,tl,tmOn]);

  const startQuiz=()=>{let pool=[...db],sel=[];
    if(mode==="normal"){const bd={};pool.forEach(q=>{(bd[q.difficulty]=bd[q.difficulty]||[]).push(q);});Object.keys(bd).forEach(k=>{bd[k]=shuffle(bd[k]);});const n=Math.min(num,pool.length);for(let i=0;i<n;i++){const td=Math.min(7,Math.max(1,Math.round(1+(i/Math.max(1,n-1))*6)));let f=null;for(let d=0;d<=6&&!f;d++)for(const o of[0,1,-1]){const t=td+d*(o||1);if(t>=1&&t<=7&&bd[t]?.length){f=bd[t].pop();break;}}if(f)sel.push(f);}
    }else if(mode==="unsolved"){sel=pool.sort((a,b)=>{const ta=(stats[a.id]?.correct||0)+(stats[a.id]?.wrong||0),tb=(stats[b.id]?.correct||0)+(stats[b.id]?.wrong||0);return ta-tb;}).slice(0,num);sel=shuffle(sel);
    }else if(mode==="difficulty")sel=shuffle(pool.filter(q=>q.difficulty===selDiff)).slice(0,num);
    else if(mode==="genre")sel=shuffle(pool.filter(q=>q.type===selGenre)).slice(0,num);
    else if(mode==="weak")sel=pool.filter(q=>stats[q.id]?.wrong>0).sort((a,b)=>{const ra=stats[a.id].correct/(stats[a.id].correct+stats[a.id].wrong),rb=stats[b.id].correct/(stats[b.id].correct+stats[b.id].wrong);return ra-rb;}).slice(0,num);
    else if(mode==="recent_wrong"){const ids=[...new Set(rw)].slice(0,num);sel=ids.map(id=>db.find(q=>q.id===id)).filter(Boolean);}
    if(!sel.length){showToast("条件に合う問題がありません。");return;}
    setQs(sel.map(q=>shuf?shuffleOpts(q):{...q,_opts:q.options,_ans:q.answer,_map:q.options.map((_,i)=>i)}));
    setCi(0);setAns([]);setTl(tmSec);setTmAct(true);setShowExp(false);setDone(false);setRvi(null);setScr("quiz");};

  const doAnswer=(ch)=>{if((showExp&&mode!=="normal")||done)return;clearTimeout(tmRef.current);setTmAct(false);
    const q=qs[ci],ok=ch===q._ans,na=[...ans,{qid:q.id,choice:ch,correct:ok}];setAns(na);
    const ns={...stats};if(!ns[q.id])ns[q.id]={correct:0,wrong:0};ok?ns[q.id].correct++:ns[q.id].wrong++;ns[q.id].last=Date.now();
    let nr=[...rw];if(!ok)nr=[q.id,...nr].slice(0,50);else nr=nr.filter(id=>id!==q.id);save(ns,nr);
    if(mode==="normal"){if(ci+1>=qs.length){setDone(true);setScr("results");}else{setCi(ci+1);setTl(tmSec);setTmAct(true);}}else setShowExp(true);};

  const nextQ=()=>{if(ci+1>=qs.length){setDone(true);setScr("results");}else{setCi(ci+1);setTl(tmSec);setTmAct(true);setShowExp(false);}};
  const delQ=id=>{doConfirm("この問題を削除しますか？",()=>{const n=db.filter(q=>q.id!==id);saveDb(n);if(lex===id)setLex(null);showToast("問題を削除しました。");});};

  const mergeImport=jsonStr=>{try{const d=JSON.parse(jsonStr);if(!Array.isArray(d)){showToast("エラー: JSON配列でない");return false;}const maxId=db.length?Math.max(...db.map(q=>q.id)):0;const newQs=d.map((q,i)=>({...q,id:q.id||maxId+i+1}));const merged=[...db];newQs.forEach(nq=>{const idx=merged.findIndex(x=>x.id===nq.id);if(idx>=0)merged[idx]=nq;else merged.push(nq);});saveDb(merged);showToast(newQs.length+"問をインポートしました（合計"+merged.length+"問）");return true;}catch{showToast("エラー: JSONの読み込みに失敗しました");return false;}};
  const doImport=e=>{const f=e.target.files?.[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{mergeImport(ev.target.result);};reader.onerror=()=>showToast("ファイル読み込み失敗");reader.readAsText(f);if(fileRef.current)fileRef.current.value="";};
  const doImportText=()=>{if(!impText.trim()){showToast("テキストが空です");return;}if(mergeImport(impText))setImpText("");};
  const doImportUrl=async()=>{if(!impUrl.trim()){showToast("URLが空です");return;}try{showToast("読み込み中...");const res=await fetch(impUrl.trim());if(!res.ok){showToast("エラー: "+res.status);return;}const txt=await res.text();if(mergeImport(txt))setImpUrl("");}catch(err){showToast("エラー: 取得失敗（"+err.message+"）");}};
  const doExport=()=>{try{const json=JSON.stringify(db,null,2);const blob=new Blob([json],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="spi-questions.json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast(db.length+"問をエクスポートしました");}catch{showToast("エクスポート失敗");}};

  const ts=useMemo(()=>{let t=0,c=0;Object.values(stats).forEach(s=>{t+=s.correct+s.wrong;c+=s.correct;});return{t,c,r:t?Math.round(c/t*100):0};},[stats]);
  const resetStats=()=>doConfirm("全ての成績データをリセットしますか？",()=>{save({},[]);showToast("成績をリセットしました。");});
  const resetDb=()=>doConfirm("問題DBを初期状態に戻しますか？\n（難易度変更・削除がすべて元に戻ります）",()=>{saveDb(DEFAULT_Q);showToast("問題DBを初期状態に戻しました。");});

  const pill=active=>({padding:"6px 14px",borderRadius:8,border:"1.5px solid "+(active?C.accent:C.border),background:active?C.accentSoft:C.card,color:C.text,fontSize:13,fontWeight:active?600:400,cursor:"pointer"});
  const btn1={background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"14px 0",fontSize:15,fontWeight:600,width:"100%",cursor:"pointer",marginTop:16};
  const btn2={background:"transparent",color:C.accent,border:"1.5px solid "+C.accent,borderRadius:10,padding:"12px 0",fontSize:14,fontWeight:600,width:"100%",cursor:"pointer",marginTop:10};
  const lbl={fontSize:11,fontWeight:600,color:C.textMid,letterSpacing:"0.8px",marginBottom:6,marginTop:0};

  if(!loaded)return <div style={{padding:16,color:C.textDim}}>読み込み中...</div>;
  const overlay=<>{toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}{cfm&&<ConfirmDlg msg={cfm.msg} onOk={()=>{cfm.fn();setCfm(null);}} onCancel={()=>setCfm(null)}/>}</>;

  if(scr==="home")return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
    <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",color:C.text}}>SPI語彙トレーニング</h1>
    <p style={{fontSize:13,color:C.textDim,margin:"0 0 24px"}}>{db.length}問収録 ・ 累計{ts.t}回解答 ・ 正答率{ts.r}%</p>
    <p style={lbl}>モード選択</p>
    {Object.entries(ML_).map(([k,l])=><div key={k} style={{background:mode===k?C.cardH:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,border:"1px solid "+(mode===k?C.accent:C.border),cursor:"pointer"}} onClick={()=>setMode(k)}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:18,height:18,borderRadius:9,border:"2px solid "+(mode===k?C.accent:C.textDim),display:"flex",alignItems:"center",justifyContent:"center"}}>{mode===k&&<div style={{width:10,height:10,borderRadius:5,background:C.accent}}/>}</div><span style={{fontSize:14,fontWeight:mode===k?600:400,color:C.text}}>{l}</span></div></div>)}
    {mode==="difficulty"&&<div style={{marginTop:12}}><p style={lbl}>難易度</p><div style={{display:"flex",gap:6}}>{[1,2,3,4,5,6,7].map(d=><button key={d} onClick={()=>setSelDiff(d)} style={{...pill(selDiff===d),flex:1}}>{d}</button>)}</div></div>}
    {mode==="genre"&&<div style={{marginTop:12}}><p style={lbl}>ジャンル</p><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(GL).map(([k,l])=><button key={k} onClick={()=>setSelGenre(k)} style={pill(selGenre===k)}>{l}</button>)}</div></div>}
    <div style={{marginTop:16}}><p style={lbl}>出題数</p><div style={{display:"flex",gap:6}}>{[5,10,15,20].map(n=><button key={n} onClick={()=>setNum(n)} style={{...pill(num===n),flex:1}}>{n}問</button>)}</div></div>
    <div style={{marginTop:16}}><p style={lbl}>制限時間</p><div style={{display:"flex",gap:6}}>{[{v:10,l:"10秒"},{v:15,l:"15秒"},{v:20,l:"20秒"},{v:0,l:"なし"}].map(({v,l})=><button key={v} onClick={()=>{setTmSec(v);setTmOn(v>0);}} style={{...pill((tmOn?tmSec:0)===v),flex:1}}>{l}</button>)}</div></div>
    <div style={{marginTop:16}}><div style={{background:C.card,borderRadius:12,padding:"14px 16px",border:"1px solid "+C.border,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setShuf_(!shuf)}><span style={{fontSize:14,color:C.text}}>選択肢をシャッフル</span><div style={{width:40,height:22,borderRadius:11,background:shuf?C.accent:C.border,position:"relative",transition:"background 0.2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:shuf?20:2,transition:"left 0.2s"}}/></div></div></div>
    <button style={btn1} onClick={startQuiz}>スタート</button>
    <button style={btn2} onClick={()=>setScr("list")}>問題一覧</button>
    <button style={btn2} onClick={()=>setScr("stats")}>成績を見る</button>
    <button style={btn2} onClick={()=>setScr("import")}>問題データ管理</button>
  </div>;

  if(scr==="quiz"){const q=qs[ci],ca=ans[ci],answered=!!ca||showExp,pct=tmOn?(tl/tmSec)*100:100,lines=q.question.split("\n"),isN=mode==="normal";
    return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:13,color:C.textMid,fontWeight:600}}>{ci+1} / {qs.length}</span><div style={{display:"flex",gap:6}}><Tag bg={C.accentSoft} fg={C.accent}>{GL[q.type]}</Tag>{!isN&&<Tag bg={C.wrong+"18"} fg={C.wrong}>難易度{q.difficulty}</Tag>}</div></div>
      {tmOn&&!answered&&<div style={{background:C.timer,borderRadius:2,height:4,marginBottom:16,overflow:"hidden"}}><div style={{height:4,borderRadius:2,width:Math.max(0,pct)+"%",transition:"width 0.1s linear",background:pct>30?C.accent:pct>10?C.warn:C.wrong}}/></div>}
      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:16,border:"1px solid "+C.border}}>{lines.map((l,i)=><p key={i} style={{fontSize:15,lineHeight:1.7,margin:i?"8px 0 0":"0",fontWeight:i?400:600,color:l.startsWith("例文")?C.accent:C.text}}>{l}</p>)}</div>
      {q._opts.map((o,i)=>{const sel=ca?.choice===i,isC_=answered&&i===q._ans,isW=answered&&sel&&i!==q._ans;return <button key={i} disabled={answered} onClick={()=>!answered&&doAnswer(i)} style={{background:isC_?C.correctBg:isW?C.wrongBg:sel?C.accentSoft:C.card,border:"1.5px solid "+(isC_?C.correct:isW?C.wrong:sel?C.accent:C.border),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:answered?"default":"pointer",fontSize:14,color:C.text,textAlign:"left",width:"100%",display:"block",transition:"all 0.15s"}}><span style={{fontWeight:600,marginRight:8,color:isC_?C.correct:isW?C.wrong:C.textDim}}>{OPT_[i]}</span>{o}{isC_&&<span style={{float:"right",color:C.correct,fontWeight:700}}>✓</span>}{isW&&<span style={{float:"right",color:C.wrong,fontWeight:700}}>✗</span>}</button>;})}
      {showExp&&!isN&&<><Expl q={q} ans={ca} db={db} setDb={setDb}/><button style={{...btn1,marginTop:12}} onClick={nextQ}>{ci+1>=qs.length?"結果を見る":"次の問題へ"}</button></>}
    </div>;
  }

  if(scr==="results"){const cc=ans.filter(a=>a.correct).length,pct_=Math.round(cc/ans.length*100);
    return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
      <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 16px",color:C.text}}>結果発表</h1>
      <div style={{background:C.card,borderRadius:12,padding:"24px 18px",border:"1px solid "+C.border,textAlign:"center",marginBottom:16}}><p style={{fontSize:48,fontWeight:800,margin:0,color:pct_>=80?C.correct:pct_>=50?C.warn:C.wrong}}>{cc}<span style={{fontSize:20,fontWeight:500,color:C.textDim}}>/{ans.length}</span></p><p style={{fontSize:14,color:C.textDim,margin:"4px 0 0"}}>正答率 {pct_}%</p></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>{ans.map((a,i)=><button key={i} onClick={()=>setRvi(rvi===i?null:i)} style={{width:36,height:36,borderRadius:8,border:"1.5px solid "+(a.correct?C.correct:C.wrong),background:rvi===i?(a.correct?C.correctBg:C.wrongBg):"transparent",color:a.correct?C.correct:C.wrong,fontSize:13,fontWeight:700,cursor:"pointer"}}>{i+1}</button>)}</div>
      {rvi!==null&&(()=>{const a=ans[rvi],q=qs[rvi],orig=db.find(x=>x.id===a.qid)||q,lines=orig.question.split("\n"),oci=a.choice>=0?q._map[a.choice]:-1;
        return <div style={{background:C.card,borderRadius:12,padding:"14px 16px",border:"1.5px solid "+(a.correct?C.correct:C.wrong),marginBottom:16}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}><Tag bg={C.accentSoft} fg={C.accent}>{GL[orig.type]}</Tag><Tag bg={C.warn+"18"} fg={C.warn}>難易度{orig.difficulty}</Tag></div>
          {lines.map((l,i)=><p key={i} style={{fontSize:13,lineHeight:1.7,margin:i?"4px 0":"0 0 8px",fontWeight:i?400:600,color:l.startsWith("例文")?C.accent:C.text}}>{l}</p>)}
          {orig.options.map((o,i)=>{const isA=i===orig.answer,isChosen=oci===i;return <p key={i} style={{fontSize:13,margin:"3px 0",lineHeight:1.6,color:isA?C.correct:isChosen?C.wrong:C.textMid,fontWeight:isA||isChosen?600:400}}>{OPT_[i]} {o}{isA&&" ✓"}{isChosen&&!isA&&" ← あなたの回答"}{a.choice===-1&&isA&&" （時間切れ）"}</p>;})}
          <div style={{borderTop:"1px solid "+C.border,paddingTop:10,marginTop:10}}><p style={{fontSize:13,lineHeight:1.7,margin:0,color:C.text}}>{orig.explanation}</p>{orig.wrongExplanations&&<div style={{marginTop:6}}>{orig.options.map((o,i)=>i!==orig.answer&&<p key={i} style={{fontSize:12,color:C.textMid,margin:"2px 0",lineHeight:1.5}}>{OPT_[i]} {o}：{orig.wrongExplanations[i>orig.answer?i-1:i]||""}</p>)}</div>}</div>
          <div style={{borderTop:"1px solid "+C.border,paddingTop:10,marginTop:10}}><DiffAdj qid={orig.id} db={db} setDb={setDb}/></div>
        </div>;})()}
      <button style={btn1} onClick={()=>setScr("home")}>ホームに戻る</button><button style={btn2} onClick={startQuiz}>もう一度</button>
    </div>;
  }

  if(scr==="list"){let fl=db.filter(q=>(lfG==="all"||q.type===lfG)&&(lfD===0||q.difficulty===lfD));
    if(lfSort==="recent")fl=[...fl].sort((a,b)=>(stats[b.id]?.last||0)-(stats[a.id]?.last||0));else if(lfSort==="diff")fl=[...fl].sort((a,b)=>a.difficulty-b.difficulty);
    return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
      <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",color:C.text}}>問題一覧</h1><p style={{fontSize:13,color:C.textDim,margin:"0 0 16px"}}>{fl.length}問表示中 / 全{db.length}問</p>
      <p style={lbl}>ジャンル</p><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>{[["all","すべて"],...Object.entries(GL)].map(([k,l])=><button key={k} onClick={()=>setLfG(k)} style={pill(lfG===k)}>{l}</button>)}</div>
      <p style={lbl}>難易度</p><div style={{display:"flex",gap:4,marginBottom:12}}>{[0,1,2,3,4,5,6,7].map(d=><button key={d} onClick={()=>setLfD(d)} style={{...pill(lfD===d),flex:1}}>{d===0?"全":d}</button>)}</div>
      <p style={lbl}>並び順</p><div style={{display:"flex",gap:4,marginBottom:16}}>{[["id","デフォルト"],["recent","最近解いた順"],["diff","難易度順"]].map(([k,l])=><button key={k} onClick={()=>setLfSort(k)} style={pill(lfSort===k)}>{l}</button>)}</div>
      {fl.map(q=>{const st=stats[q.id]||{correct:0,wrong:0},tot=st.correct+st.wrong,rate=tot?Math.round(st.correct/tot*100):null,ex=lex===q.id,fl0=q.question.split("\n")[0];
        return <div key={q.id} style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,border:"1px solid "+(ex?C.accent:C.border),cursor:"pointer"}} onClick={()=>setLex(ex?null:q.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1,minWidth:0}}><div style={{display:"flex",gap:4,marginBottom:4,flexWrap:"wrap"}}><Tag bg={C.accentSoft} fg={C.accent}>{GL[q.type]}</Tag><Tag bg={C.warn+"18"} fg={C.warn}>Lv.{q.difficulty}</Tag>{rate!==null&&<Tag bg={rate>=70?C.correctBg:rate>=40?C.warn+"18":C.wrongBg} fg={rate>=70?C.correct:rate>=40?C.warn:C.wrong}>{rate}%（{tot}回）</Tag>}</div><p style={{fontSize:13,color:C.text,margin:0,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:ex?"normal":"nowrap"}}>{fl0}</p></div><span style={{fontSize:12,color:C.textDim,marginLeft:8,flexShrink:0}}>{ex?"▲":"▼"}</span></div>
          {ex&&<div onClick={e=>e.stopPropagation()} style={{marginTop:12,borderTop:"1px solid "+C.border,paddingTop:12}}>
            {q.question.split("\n").map((l,i)=><p key={i} style={{fontSize:13,lineHeight:1.7,margin:i?"4px 0":"0",fontWeight:i?400:600,color:l.startsWith("例文")?C.accent:C.text}}>{l}</p>)}
            <div style={{marginTop:8}}>{q.options.map((o,i)=><p key={i} style={{fontSize:13,margin:"3px 0",lineHeight:1.6,color:i===q.answer?C.correct:C.textMid,fontWeight:i===q.answer?600:400}}>{OPT_[i]} {o}{i===q.answer&&" ✓"}</p>)}</div>
            <div style={{marginTop:10,padding:"10px 12px",background:C.accentSoft,borderRadius:8}}><p style={{fontSize:12,fontWeight:600,color:C.accent,margin:"0 0 4px"}}>解説</p><p style={{fontSize:12,lineHeight:1.6,margin:0,color:C.text}}>{q.explanation}</p>{q.wrongExplanations&&<div style={{marginTop:6}}>{q.options.map((o,i)=>i!==q.answer&&<p key={i} style={{fontSize:11,color:C.textMid,margin:"2px 0",lineHeight:1.5}}>{OPT_[i]} {o}：{q.wrongExplanations[i>q.answer?i-1:i]||""}</p>)}</div>}</div>
            <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><DiffAdj qid={q.id} db={db} setDb={setDb}/><button onClick={()=>delQ(q.id)} style={{fontSize:12,color:C.wrong,background:"transparent",border:"1px solid "+C.wrong,borderRadius:6,padding:"4px 12px",cursor:"pointer",fontWeight:600}}>削除</button></div>
          </div>}
        </div>;})}
      <button style={btn1} onClick={()=>setScr("home")}>ホームに戻る</button>
    </div>;
  }

  if(scr==="stats"){const qst=db.map(q=>{const s=stats[q.id]||{correct:0,wrong:0},t=s.correct+s.wrong;return{...q,...s,total:t,rate:t?Math.round(s.correct/t*100):null};}).filter(q=>q.total>0).sort((a,b)=>(a.rate??100)-(b.rate??100));
    const bg_={};db.forEach(q=>{const s=stats[q.id]||{correct:0,wrong:0};if(!bg_[q.type])bg_[q.type]={correct:0,wrong:0};bg_[q.type].correct+=s.correct;bg_[q.type].wrong+=s.wrong;});
    return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
      <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",color:C.text}}>成績データ</h1><p style={{fontSize:13,color:C.textDim,margin:"0 0 20px"}}>累計{ts.t}回解答 ・ 正答率{ts.r}%</p>
      <p style={lbl}>ジャンル別正答率</p>
      {Object.entries(GL).map(([k,l])=>{const g=bg_[k]||{correct:0,wrong:0},t=g.correct+g.wrong,r=t?Math.round(g.correct/t*100):0;return <div key={k} style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,border:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,color:C.text}}>{l}</span><div style={{textAlign:"right"}}><span style={{fontSize:16,fontWeight:700,color:r>=70?C.correct:r>=40?C.warn:t?C.wrong:C.textDim}}>{t?r+"%":"—"}</span><span style={{fontSize:11,color:C.textDim,marginLeft:8}}>{t}回</span></div></div>;})}
      {qst.length>0&&<><p style={{...lbl,marginTop:20}}>苦手な問題</p>{qst.slice(0,10).map(q=><div key={q.id} style={{background:C.card,borderRadius:12,padding:"12px 16px",marginBottom:8,border:"1px solid "+C.border}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",gap:4}}><Tag bg={C.accentSoft} fg={C.accent}>{GL[q.type]}</Tag><Tag bg={C.warn+"18"} fg={C.warn}>Lv.{q.difficulty}</Tag></div><span style={{fontSize:14,fontWeight:700,color:q.rate>=70?C.correct:q.rate>=40?C.warn:C.wrong}}>{q.rate}%</span></div><p style={{fontSize:12,color:C.textMid,margin:0,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.question.split("\n")[0]}</p><p style={{fontSize:11,color:C.textDim,margin:"2px 0 0"}}>○{q.correct}回 ✗{q.wrong}回</p></div>)}</>}
      <button style={btn1} onClick={()=>setScr("home")}>ホームに戻る</button><button style={{...btn2,color:C.wrong,borderColor:C.wrong}} onClick={resetStats}>成績をリセット</button>
    </div>;
  }
  if(scr==="import"){
    const ta={width:"100%",minHeight:120,borderRadius:10,border:"1.5px solid "+C.border,padding:12,fontSize:13,fontFamily:"inherit",color:C.text,background:C.card,resize:"vertical"};
    const inp={width:"100%",borderRadius:10,border:"1.5px solid "+C.border,padding:"12px 14px",fontSize:13,color:C.text,background:C.card};
    return <div style={{maxWidth:640,margin:"0 auto",padding:16}}>{overlay}
      <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",color:C.text}}>問題データ管理</h1>
      <p style={{fontSize:13,color:C.textDim,margin:"0 0 20px"}}>現在 {db.length}問</p>

      <div style={{background:C.card,borderRadius:14,padding:"18px 16px",border:"1px solid "+C.border,marginBottom:16}}>
        <p style={{...lbl,margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.text}}>URLから取得</p>
        <p style={{fontSize:12,color:C.textDim,margin:"0 0 8px"}}>問題JSONを配置したURL（GitHub等）を入力してください</p>
        <input type="text" value={impUrl} onChange={e=>setImpUrl(e.target.value)} placeholder="https://example.com/questions.json" style={inp}/>
        <button style={{...btn1,marginTop:10}} onClick={doImportUrl}>URLから取得してインポート</button>
      </div>

      <div style={{background:C.card,borderRadius:14,padding:"18px 16px",border:"1px solid "+C.border,marginBottom:16}}>
        <p style={{...lbl,margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.text}}>テキスト貼り付け</p>
        <p style={{fontSize:12,color:C.textDim,margin:"0 0 8px"}}>JSON形式のテキストを貼り付けてください</p>
        <textarea value={impText} onChange={e=>setImpText(e.target.value)} placeholder={'[\n  {"id":1, "type":"meaning", ...}\n]'} style={ta}/>
        <button style={{...btn1,marginTop:10}} onClick={doImportText}>テキストからインポート</button>
      </div>

      <div style={{background:C.card,borderRadius:14,padding:"18px 16px",border:"1px solid "+C.border,marginBottom:16}}>
        <p style={{...lbl,margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.text}}>ファイルから読み込み</p>
        <input ref={fileRef} type="file" accept=".json" onChange={doImport} style={{display:"none"}}/>
        <button style={{...btn2,marginTop:0}} onClick={()=>{if(fileRef.current){fileRef.current.value="";fileRef.current.click();}}}>JSONファイルを選択</button>
      </div>

      <div style={{background:C.card,borderRadius:14,padding:"18px 16px",border:"1px solid "+C.border,marginBottom:16}}>
        <p style={{...lbl,margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.text}}>エクスポート・リセット</p>
        <button style={{...btn2,marginTop:0}} onClick={doExport}>現在の問題をJSONへエクスポート</button>
        <button style={{...btn2,color:C.warn,borderColor:C.warn}} onClick={resetDb}>問題DBを初期状態に戻す</button>
        <button style={{...btn2,color:C.wrong,borderColor:C.wrong}} onClick={resetStats}>成績をリセット</button>
      </div>

      <button style={btn1} onClick={()=>setScr("home")}>ホームに戻る</button>
    </div>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
